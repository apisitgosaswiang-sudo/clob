<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B16">
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="./style.css?v=231-repaired">
</head>
<body>
<header>
  <div class="brand-wrap">
    <span class="dot"></span>
    <div style="min-width:0">
      <div class="brand">Workout Tracker <span class="version-badge">V2</span></div>
      <div class="subtitle">TRAIN • TRACK • PROGRESS</div>
    </div>
  </div>
  <div class="actions">
    <span class="saving" id="saving">กำลังบันทึก...</span>
    <button class="btn btn-pill btn-ghost" id="trainerBtn">เทรนเนอร์</button>
    <button class="btn btn-pill btn-ghost" id="logoutBtn" hidden>ออกจากระบบ</button>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast">บันทึกเรียบร้อยแล้ว</div>

<div class="modal" id="pinModal">
  <div class="modal-box">
    <h3>เข้าสู่ระบบเทรนเนอร์</h3>
    <p class="small">กรอกรหัส 4 หลัก</p>
    <input id="pinInput" class="input pin" maxlength="4" inputmode="numeric" placeholder="••••">
    <p id="pinError" class="small error" hidden>รหัสไม่ถูกต้อง</p>
    <div class="grid2" style="margin-top:14px">
      <button class="btn" id="pinCancel">ยกเลิก</button>
      <button class="btn btn-primary" id="pinConfirm">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>
  <script type="module" src="./app.js?v=231-repaired"></script>
</body>
</html>
